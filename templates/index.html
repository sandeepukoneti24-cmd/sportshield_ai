<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SportShield AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .hidden { display: none; }
        body { font-family: 'Inter', sans-serif; background: #F8FAFC; }
    </style>
</head>
<body>
    <!-- Login View -->
    <div id="login-view" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md border border-gray-100">
            <div class="text-center mb-8">
                <div class="bg-blue-600 w-12 h-12 rounded-xl flex items-center justify-center text-white mx-auto mb-4">
                    <i data-lucide="shield-check"></i>
                </div>
                <h1 class="text-2xl font-bold">SportShield AI</h1>
                <p class="text-gray-500">Sign in to access dashboard</p>
            </div>
            <input type="text" id="username" placeholder="Username" class="w-full p-4 mb-4 border rounded-xl outline-none focus:ring-2 ring-blue-500">
            <input type="password" id="password" placeholder="Password" class="w-full p-4 mb-6 border rounded-xl outline-none focus:ring-2 ring-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition">Enter Platform</button>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="hidden">
        <nav class="bg-white border-b px-10 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2 font-bold text-xl">
                <i data-lucide="shield-check" class="text-blue-600"></i> SportShield
            </div>
            <div class="flex gap-4">
                <button onclick="loadHistory()" class="text-gray-600 font-medium">History</button>
                <a href="/logout" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-sm font-bold">Logout</a>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto p-10">
            <!-- Upload Area -->
            <div id="drop-zone" class="bg-white border-2 border-dashed border-gray-200 rounded-3xl p-12 text-center cursor-pointer hover:border-blue-400 mb-10">
                <input type="file" id="file-input" class="hidden" onchange="handleUpload(this.files[0])">
                <i data-lucide="upload-cloud" class="mx-auto w-12 h-12 text-blue-600 mb-4"></i>
                <h2 class="text-xl font-bold">Upload Media</h2>
                <button class="mt-4 bg-gray-900 text-white px-6 py-2 rounded-lg">Browse Files</button>
            </div>

            <!-- Analysis Results -->
            <div id="results" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="bg-white p-6 rounded-2xl border">
                    <h3 class="font-bold mb-4">Match Analysis</h3>
                    <div id="similarity-circle" class="text-3xl font-bold text-blue-600">0%</div>
                    <p id="ai-insight" class="mt-4 text-sm text-gray-600 italic bg-gray-50 p-4 rounded-lg border-l-4 border-blue-500"></p>
                </div>
                <div class="bg-white p-6 rounded-2xl border">
                    <h3 class="font-bold mb-2">Digital Cert</h3>
                    <p class="text-xs text-gray-400">ID: <span id="res-id" class="text-black font-mono"></span></p>
                    <p class="text-xs text-gray-400">Hash: <span id="res-hash" class="text-black font-mono"></span></p>
                </div>
            </div>

            <!-- History Section -->
            <div id="history-panel" class="hidden bg-white p-6 rounded-2xl border">
                <h3 class="font-bold mb-4">Recent Scans</h3>
                <div id="history-list" class="space-y-3"></div>
            </div>
        </main>
    </div>

    <script src="/static/js/main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
